server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:antifraude}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:jwt_secret_key_default_change_in_production}
    expiration-ms: 86400000
  aes:
    secret: ${AES_SECRET:aes_secret_key_default_change_in_production}
  external-api:
    base-url: http://localhost:3001
    api-key: ${EXTERNAL_API_KEY:mock_api_key}
    timeout: 5000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
